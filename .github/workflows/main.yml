name: Databrick PR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - 'README.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # STAGE 1: STAGING DEPLOYMENT & DATA QUALITY TESTING
  # This triggers on Pull Requests to catch schema errors BEFORE code hits production
  deploying-staging:
    runs-on: ubuntu-latest
    environment: staging
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_URL }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      REPO_PATH: "/Workspace/Users/kudziemanyanya@gmail.com/Databricks_Data_warehouse"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Sync Code to Staging Workspace
        run: |
          # If it's a PR, sync the feature branch. If it's a merge to main, sync main.
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          echo "Syncing Staging workspace Repo to branch: $BRANCH_NAME"
          
          databricks repos update "${{ env.REPO_PATH }}" --branch "$BRANCH_NAME"
